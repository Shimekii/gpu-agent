<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали пользователя</title>
    <link rel="stylesheet" href="student.css">
    <style>
        .scroll-table {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            margin-bottom: 20px;
            background: #fff;
        }
        .user-info-block { text-align: left; margin-bottom: 20px; line-height: 1.6; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        /* Стили для таблиц внутри скролла */
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #f8f9fa; }
    </style>
</head>

<body class="student-layout" onload="loadUserDetails()">
<div class="student-title">Детали пользователя</div>
<div class="request-card wide">
    <div id="userInfo" class="user-info-block">
    </div>

    <h3>Логи подключений</h3>
    <div class="scroll-table">
        <table>
            <thead><tr><th>ID</th><th>Вход</th><th>Выход</th><th>Тип</th></tr></thead>
            <tbody id="logsTable"></tbody>
        </table>
    </div>

    <h3>Заявки</h3>
    <div class="scroll-table">
        <table>
            <thead><tr><th>№</th><th>Цель</th><th>Дата</th><th>Время</th><th>Статус</th></tr></thead>
            <tbody id="reqTable"></tbody>
        </table>
    </div>

    <div class="flex-row">
        <button class="btn-secondary" onclick="location.href='admin_users.html'">Назад</button>
        <button class="btn-delete" onclick="deleteUser()">Удалить пользователя</button>
    </div>
</div>

<script>
    async function loadUserDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const login = urlParams.get('login');

        // 1. Загружаем инфу о юзере
        const uResp = await fetch(`/users?login=${login}`);
        const user = await uResp.json();
        document.getElementById('userInfo').innerHTML = `
                <b>Логин:</b> ${user.login}<br>
                <b>ФИО:</b> ${user.fullName || 'Не указано'}<br>
                <b>Дата создания:</b> ${new Date(user.createdAt).toLocaleDateString()}
            `;

        // 2. Загружаем заявки этого юзера (используем наш готовый RequestServlet)
        const rResp = await fetch(`/requests?login=${user.login}&action=list`);
        const requests = await rResp.json();
        const reqTable = document.getElementById('reqTable');
        requests.forEach((r, i) => {
            const start = new Date(r.startTime);
            const end = new Date(r.endTime);

            // Форматируем время ЧЧ:ММ
            const timeRange = `${start.getHours().toString().padStart(2, '0')}:${start.getMinutes().toString().padStart(2, '0')} - ` +
                `${end.getHours().toString().padStart(2, '0')}:${end.getMinutes().toString().padStart(2, '0')}`;

            reqTable.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${r.purpose}</td>
            <td>${start.toLocaleDateString()}</td>
            <td>${timeRange}</td> <td>${r.status}</td>
        </tr>`;
        });

        // 3. Логи (пока будет пусто, так как репозиторий логов еще не делали)
        document.getElementById('logsTable').innerHTML = '<tr><td colspan="4">Логов пока нет</td></tr>';
    }

    async function deleteUser() {
        const urlParams = new URLSearchParams(window.location.search);
        const login = urlParams.get('login');

        if (!login) return;

        if (confirm(`Вы уверены, что хотите безвозвратно удалить пользователя ${login}?`)) {
            try {
                const resp = await fetch(`/users?login=${login}`, {
                    method: 'DELETE'
                });

                if (resp.ok) {
                    alert("Пользователь успешно удален");
                    location.href = 'admin_users.html';
                } else {
                    const errorData = await resp.json();
                    alert("Ошибка при удалении: " + (errorData.error || "Неизвестная ошибка"));
                }
            } catch (e) {
                console.error(e);
                alert("Не удалось связаться с сервером");
            }
        }
    }
</script>
</body>
