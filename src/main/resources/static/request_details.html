<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Детали заявки</title>
  <link rel="stylesheet" href="student.css">
  <style>
    .info-row { margin-bottom: 12px; font-size: 16px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
    .info-label { font-weight: bold; color: #555; width: 180px; display: inline-block; }
    .btn-approve { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .btn-reject { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .btn-row-centered { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
  </style>
</head>
<body class="student-layout" onload="loadRequestFull()">
<div class="student-title">Детали заявки</div>
<div class="request-card">
  <div id="requestDetails">
  </div>

  <div class="btn-row-centered">
    <button class="btn-secondary" onclick="location.href='admin_requests.html'">Назад</button>
    <button id="btnApprove" class="btn-approve" onclick="updateStatus('APPROVED')">Одобрить</button>
    <button id="btnReject" class="btn-reject" onclick="updateStatus('REJECTED')">Отклонить</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const requestId = urlParams.get('id');

  async function loadRequestFull() {
    // Сначала получаем данные заявки
    const resp = await fetch(`/requests?action=get&id=${requestId}`);
    const r = await resp.json();

    // Затем получаем данные пользователя, чтобы вытащить ФИО
    const uResp = await fetch(`/users?login=${r.userLogin}`);
    const user = await uResp.json();

    document.getElementById('requestDetails').innerHTML = `
            <div class="info-row"><span class="info-label">ID:</span> ${r.id}</div>
            <div class="info-row"><span class="info-label">Пользователь:</span> ${r.userLogin}</div>
            <div class="info-row"><span class="info-label">ФИО:</span> ${user.fullName || '—'}</div>
            <div class="info-row"><span class="info-label">Время начала:</span> ${new Date(r.startTime).toLocaleString()}</div>
            <div class="info-row"><span class="info-label">Время окончания:</span> ${new Date(r.endTime).toLocaleString()}</div>
            <div class="info-row"><span class="info-label">Цель:</span> ${r.purpose}</div>
            <div class="info-row"><span class="info-label">Статус:</span> <b>${r.status}</b></div>
            <div class="info-row"><span class="info-label">Дата создания:</span> ${new Date(r.createdAt).toLocaleDateString()}</div>
        `;

    // Скрываем кнопки, если решение уже принято
    if (r.status !== 'CREATED') {
      document.getElementById('btnApprove').style.display = 'none';
      document.getElementById('btnReject').style.display = 'none';
    }
  }

  async function updateStatus(newStatus) {
    if (!confirm(`Сменить статус на ${newStatus}?`)) return;

    const resp = await fetch('/requests', {
      method: 'POST',
      body: JSON.stringify({
        action: 'updateStatus',
        id: requestId,
        status: newStatus
      })
    });

    if (resp.ok) {
      alert("Статус обновлен");
      location.reload();
    }
  }
</script>
</body>
</html>
