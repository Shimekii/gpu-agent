<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Детали подключения</title>
  <link rel="stylesheet" href="student.css">
  <style>
    .info-row { margin-bottom: 12px; font-size: 16px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
    .info-label { font-weight: bold; color: #555; width: 180px; display: inline-block; }
  </style>
</head>
<body class="student-layout" onload="loadLogDetails()">
<div class="student-title">Детали подключения</div>
<div class="request-card">
  <div id="logContent">
  </div>
  <div class="flex-row">
    <button class="btn-secondary" onclick="location.href='admin_connections.html'">Назад</button>
  </div>
</div>

<script>
  // Универсальная функция форматирования даты (такая же как в списке)
  function formatAnyDate(dateVal) {
    if (!dateVal) return '—';

    // Если это число (секунды или миллисекунды)
    if (typeof dateVal === 'number') {
      const ms = dateVal < 10000000000 ? dateVal * 1000 : dateVal;
      return new Date(ms).toLocaleString();
    }

    // Если это объект Instant от Jackson {epochSecond: ...}
    if (typeof dateVal === 'object' && dateVal.epochSecond) {
      return new Date(dateVal.epochSecond * 1000).toLocaleString();
    }

    // Если это ISO строка
    return new Date(dateVal).toLocaleString();
  }

  async function loadLogDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const logId = urlParams.get('id');

    const resp = await fetch(`/logs?action=get&id=${logId}`);
    const log = await resp.json();

    // Используем функцию formatAnyDate для вывода
    document.getElementById('logContent').innerHTML = `
            <div class="info-row"><span class="info-label">ID:</span> ${logId}</div>
            <div class="info-row"><span class="info-label">Пользователь:</span> ${log.id}</div>
            <div class="info-row"><span class="info-label">Время входа:</span> ${formatAnyDate(log.loginTime)}</div>
            <div class="info-row"><span class="info-label">Время выхода:</span> ${log.logoutTime ? formatAnyDate(log.logoutTime) : 'Сессия не завершена'}</div>
            <div class="info-row"><span class="info-label">Тип подключения:</span> <code>${log.connectionType}</code></div>
        `;
  }
</script>
</body>
</html>
