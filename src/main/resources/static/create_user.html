<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание пользователя</title>
    <link rel="stylesheet" href="student.css">
</head>

<body class="student-layout">
<div class="student-title">Панель администратора</div>
<div class="request-card">
    <h2>Создать пользователя</h2>
    <div class="form-group">
        <label>Логин</label>
        <input type="text" id="newLogin">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="newPass">
    </div>
    <div class="form-group">
        <label>ФИО</label>
        <input type="text" id="newFio" placeholder="Иванов Иван Иванович">
    </div>
    <div class="flex-row">
        <button class="btn-secondary" onclick="history.back()">Назад</button>
        <button class="btn-create" onclick="saveUser()">+ Создать</button>
    </div>
</div>
<script>
    async function saveUser() {
        const data = {
            action: 'create',
            login: document.getElementById('newLogin').value,
            password: document.getElementById('newPass').value,
            fullName: document.getElementById('newFio').value,
            role: 'USER'
        };
        const resp = await fetch('/users', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (resp.status === 201) {
            alert("Пользователь создан");
            location.href='admin_users.html';
        } else {
            const err = await resp.json();
            alert("Ошибка: " + (err.error || err.message));
        }

        // if (resp.ok) { location.href='admin_users.html'; }
    }
</script>
</body>
